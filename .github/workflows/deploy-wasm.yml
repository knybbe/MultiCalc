name: Deploy WASM to GitHub Pages

on:
  # Deployment logic is now inside ci.yml (depends on build-wasm success).
  # This file kept only for manual workflow_dispatch if needed.
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: false

# Deployment logic has been moved into ci.yml (as job "deploy-wasm" that needs: build-wasm).
# This file is kept only for reference / future manual dispatch if needed.
# Remove this file if no longer required.
