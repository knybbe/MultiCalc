name: MultiCalc CI

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]
  workflow_dispatch:

jobs:
  test:
    if: github.event_name == 'push' || github.event_name == 'pull_request' || github.event_name == 'workflow_dispatch'
    runs-on: ubuntu-latest
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
    steps:
      - uses: actions/checkout@v7

      - name: Setup .NET
        uses: actions/setup-dotnet@v5
        with:
          dotnet-version: '10.0.x'

      - name: Restore Core
        run: dotnet restore MultiCalc.Core/MultiCalc.Core.csproj -p:TargetFrameworks=net10.0

      - name: Restore
        working-directory: MultiCalc.Tests
        run: dotnet msbuild MultiCalc.Tests.csproj /t:Restore /p:TargetFramework=net10.0

      - name: Test
        working-directory: MultiCalc.Tests
        run: dotnet test MultiCalc.Tests.csproj --no-restore --verbosity normal --logger "console;verbosity=detailed"

  build-wasm:
    if: github.event_name == 'push' || github.event_name == 'pull_request' || github.event_name == 'workflow_dispatch'
    needs: test
    runs-on: ubuntu-latest
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
    steps:
      - uses: actions/checkout@v7

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: '24'

      - uses: actions/setup-dotnet@v5
        with:
          dotnet-version: '10.0.x'

      - name: Install WASM workload
        run: dotnet workload install wasm-tools

      - name: Restore Core
        run: dotnet restore MultiCalc.Core/MultiCalc.Core.csproj -p:TargetFrameworks=net10.0-browserwasm

      - name: Restore
        run: dotnet restore MultiCalc/MultiCalc.csproj -p:TargetFrameworks=net10.0-browserwasm --no-dependencies

      - name: Set BaseHref for deployment
        id: basehref
        run: |
          if [[ "${{ github.event_name }}" == "pull_request" ]]; then
            echo "value=/MultiCalc/prerelease/${{ github.event.pull_request.number }}/" >> $GITHUB_OUTPUT
          else
            echo "value=/MultiCalc/" >> $GITHUB_OUTPUT
          fi

      - name: Publish WASM
        run: dotnet publish MultiCalc/MultiCalc.csproj -c Release -f net10.0-browserwasm -p:TargetFrameworks=net10.0-browserwasm -p:BaseHref=${{ steps.basehref.outputs.value }} -o artifacts/wasm --no-restore

      - name: Upload WASM artifact
        uses: actions/upload-artifact@v4
        with:
          name: wasm
          path: artifacts/wasm
          retention-days: 7

  build-desktop-linux:
    if: github.event_name == 'push' || github.event_name == 'pull_request' || github.event_name == 'workflow_dispatch'
    needs: test
    runs-on: ubuntu-latest
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-dotnet@v5
        with:
          dotnet-version: '10.0.x'

      - name: Restore Core
        run: dotnet restore MultiCalc.Core/MultiCalc.Core.csproj -p:TargetFrameworks=net10.0-desktop

      - name: Restore
        run: dotnet restore MultiCalc/MultiCalc.csproj -p:TargetFrameworks=net10.0-desktop --no-dependencies

      - name: Publish Linux Desktop
        run: dotnet publish MultiCalc/MultiCalc.csproj -c Release -f net10.0-desktop -p:TargetFrameworks=net10.0-desktop -o artifacts/linux-desktop --no-restore

      - name: Upload Linux artifact
        uses: actions/upload-artifact@v4
        with:
          name: linux-desktop
          path: artifacts/linux-desktop
          retention-days: 7

  build-windows:
    if: github.event_name == 'push' || github.event_name == 'pull_request' || github.event_name == 'workflow_dispatch'
    needs: test
    runs-on: windows-latest
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-dotnet@v5
        with:
          dotnet-version: '10.0.x'

      - name: Restore Core
        run: dotnet restore MultiCalc.Core/MultiCalc.Core.csproj -p:TargetFrameworks=net10.0-desktop

      - name: Restore
        run: dotnet restore MultiCalc/MultiCalc.csproj -p:TargetFrameworks=net10.0-desktop --no-dependencies

      - name: Publish Windows
        run: dotnet publish MultiCalc/MultiCalc.csproj -c Release -f net10.0-desktop -p:TargetFrameworks=net10.0-desktop -o artifacts/windows --no-restore

      - name: Upload Windows artifact
        uses: actions/upload-artifact@v4
        with:
          name: windows
          path: artifacts/windows
          retention-days: 7

  build-android:
    if: github.event_name == 'push' || github.event_name == 'pull_request' || github.event_name == 'workflow_dispatch'
    needs: test
    runs-on: ubuntu-latest
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-dotnet@v5
        with:
          dotnet-version: '10.0.x'

      - name: Install Android workload
        run: dotnet workload install android

      - name: Restore Core
        run: dotnet restore MultiCalc.Core/MultiCalc.Core.csproj -p:TargetFrameworks=net10.0-android

      - name: Restore
        run: dotnet restore MultiCalc/MultiCalc.csproj -p:TargetFrameworks=net10.0-android --no-dependencies

      - name: Publish Android
        run: dotnet publish MultiCalc/MultiCalc.csproj -c Release -f net10.0-android -p:TargetFrameworks=net10.0-android -o artifacts/android --no-restore

      - name: Upload Android artifact
        uses: actions/upload-artifact@v4
        with:
          name: android
          path: artifacts/android
          retention-days: 7

  build-ios-macos:
    if: github.event_name == 'push' || github.event_name == 'pull_request' || github.event_name == 'workflow_dispatch'
    needs: test
    runs-on: macos-latest
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-dotnet@v5
        with:
          dotnet-version: '10.0.x'

      - name: Install iOS workload
        run: dotnet workload install ios
        # macOS desktop usually available; iOS for simulator/archive

      - name: Restore Core (macOS Desktop)
        run: dotnet restore MultiCalc.Core/MultiCalc.Core.csproj -p:TargetFrameworks=net10.0-desktop

      - name: Restore macOS Desktop
        run: dotnet restore MultiCalc/MultiCalc.csproj -p:TargetFrameworks=net10.0-desktop --no-dependencies

      - name: Publish macOS Desktop
        run: dotnet publish MultiCalc/MultiCalc.csproj -c Release -f net10.0-desktop -p:TargetFrameworks=net10.0-desktop -o artifacts/macos --no-restore

      - name: Restore Core (iOS)
        run: dotnet restore MultiCalc.Core/MultiCalc.Core.csproj -p:TargetFrameworks=net10.0-ios

      - name: Restore iOS
        run: dotnet restore MultiCalc/MultiCalc.csproj -p:TargetFrameworks=net10.0-ios --no-dependencies

      - name: Publish iOS (unsigned for CI)
        run: dotnet publish MultiCalc/MultiCalc.csproj -c Release -f net10.0-ios -p:TargetFrameworks=net10.0-ios -o artifacts/ios --no-restore || echo "iOS publish may require additional setup/signing; artifact may be partial"

      - name: Upload iOS/macOS artifacts
        uses: actions/upload-artifact@v4
        with:
          name: ios-macos
          path: artifacts/
          retention-days: 7

  deploy-wasm:
    # Run on PRs (for preview verification) and on main pushes (production).
    # Only if from the same repo (not forks) for PRs to have pages permissions.
    if: >-
      (github.event_name == 'pull_request' && github.event.pull_request.head.repo.full_name == github.repository) ||
      (github.event_name == 'push' && github.ref == 'refs/heads/main') ||
      github.event_name == 'workflow_dispatch'
    needs: build-wasm
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pages: write
      id-token: write
    concurrency:
      group: "pages-${{ github.event_name == 'pull_request' && github.event.pull_request.number || 'main' }}"
      cancel-in-progress: true
    environment:
      name: ${{ github.event_name == 'pull_request' && 'prerelease' || 'github-pages' }}
      url: https://knybbe.github.io/MultiCalc/${{ github.event_name == 'pull_request' && format('prerelease/{0}', github.event.pull_request.number) || '' }}
    steps:
      # Download the artifact produced by the needed build-wasm job
      # (the job only runs after successful build-wasm on main or dispatch)
      - name: Download WASM artifact from build-wasm
        uses: actions/download-artifact@v4
        with:
          name: wasm
          path: site

      - name: Restructure site for PR prerelease subpath
        if: github.event_name == 'pull_request'
        run: |
          PR_NUM="${{ github.event.pull_request.number }}"
          mkdir -p /tmp/pr_content
          mv site/* /tmp/pr_content/ 2>/dev/null || true
          mkdir -p site/prerelease/$PR_NUM
          mv /tmp/pr_content/* site/prerelease/$PR_NUM/ 2>/dev/null || true
          echo "Restructured for prerelease/$PR_NUM"

      - name: Prepare GitHub Pages site (promote wwwroot + SPA fallback)
        run: |
          # Uno WASM publish puts the app (including index.html) under wwwroot/
          # Copy its contents up so the app is served from the site root
          if [ -d "site/wwwroot" ]; then
            cp -r site/wwwroot/* site/ || true
            rm -rf site/wwwroot || true
          fi

          cp site/index.html site/404.html || true
          touch site/.nojekyll

      - name: Add service worker stub (prevent 404 for PWA registration at wrong scope)
        run: |
          echo 'self.addEventListener("install", () => self.skipWaiting());' > site/service-worker.js || true

      - name: Fix paths for /MultiCalc/ subfolder (normalize doubles first, then prefix)
        run: |
          # 1. Fix any double-prefix that was introduced by previous steps or BaseHref + sed combo
          find site -type f \( -name "*.html" -o -name "*.js" -o -name "*.css" -o -name "*.json" -o -name "manifest.webmanifest" \) -exec \
            sed -i 's|/MultiCalc/MultiCalc/|/MultiCalc/|g' {} + || true

          # 2. Prefix root-absolute paths that do not already start with /MultiCalc
          # This safely handles package_ hashes, css, js, manifest, favicon etc.
          find site -type f \( -name "*.html" -o -name "*.js" -o -name "*.css" -o -name "*.json" -o -name "manifest.webmanifest" \) -exec \
            sed -i \
              -e 's|="\(/[^M][^"]*\)"|="/MultiCalc\1"|g' \
              -e "s|='\(/[^M][^']*\)'|='/MultiCalc\1'|g" \
              -e 's|"\(/package_[^"]*\)"|"/MultiCalc\1"|g' \
              -e "s|'\(/package_[^']*\)'|'/MultiCalc\1'|g" \
              -e 's|"/manifest.webmanifest"|"/MultiCalc/manifest.webmanifest"|g' \
              -e 's|"/favicon.ico"|"/MultiCalc/favicon.ico"|g' \
              -e 's|"/normalize.css"|"/MultiCalc/normalize.css"|g' \
              -e 's|"/uno.css"|"/MultiCalc/uno.css"|g' \
              -e 's|"/Fonts.css"|"/MultiCalc/Fonts.css"|g' \
              -e 's|"/uno-bootstrap.js"|"/MultiCalc/uno-bootstrap.js"|g' \
              -e 's|"/uno-bootstrap.css"|"/MultiCalc/uno-bootstrap.css"|g' \
              {} + || true

      - name: Remove pre-compressed assets so rewritten source files are served
        run: |
          # .br and .gz contain the old absolute paths. Remove them to force serving the fixed versions.
          find site \( -name "*.br" -o -name "*.gz" \) -delete || true

      - name: Ensure <base> tag for subfolder
        run: |
          # Help any relative loads and the app itself know the correct base.
          if [ -f site/index.html ] && ! grep -q 'base href' site/index.html; then
            sed -i 's|<head>|<head><base href="/MultiCalc/">|' site/index.html || true
          fi

      - name: Setup Pages
        uses: actions/configure-pages@v5

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: ./site

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4

      - name: Comment on PR with preview URL
        if: github.event_name == 'pull_request'
        uses: actions/github-script@v7
        with:
          script: |
            const prNumber = context.payload.pull_request.number;
            const previewUrl = `https://knybbe.github.io/MultiCalc/prerelease/${prNumber}/`;
            github.rest.issues.createComment({
              issue_number: prNumber,
              owner: context.repo.owner,
              repo: context.repo.repo,
              body: `🚀 WASM preview deployed for this PR:\n\n${previewUrl}\n\n(Deployed from this run: ${context.serverUrl}/${context.repo.owner}/${context.repo.repo}/actions/runs/${context.runId})`
            });
