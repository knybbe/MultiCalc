name: MultiCalc CI

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]
  workflow_dispatch:

jobs:
  test:
    if: github.event_name == 'push' || github.event_name == 'pull_request' || github.event_name == 'workflow_dispatch'
    runs-on: ubuntu-latest
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
    steps:
      - uses: actions/checkout@v7

      - name: Setup .NET
        uses: actions/setup-dotnet@v5
        with:
          dotnet-version: '10.0.x'

      - name: Restore Core
        run: dotnet restore MultiCalc.Core/MultiCalc.Core.csproj -p:TargetFrameworks=net10.0

      - name: Restore
        working-directory: MultiCalc.Tests
        run: dotnet msbuild MultiCalc.Tests.csproj /t:Restore /p:TargetFramework=net10.0

      - name: Test
        working-directory: MultiCalc.Tests
        run: dotnet test MultiCalc.Tests.csproj --no-restore --verbosity normal --logger "console;verbosity=detailed"

  build-wasm:
    if: github.event_name == 'push' || github.event_name == 'pull_request' || github.event_name == 'workflow_dispatch'
    needs: test
    runs-on: ubuntu-latest
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
    steps:
      - uses: actions/checkout@v7

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: '24'

      - uses: actions/setup-dotnet@v5
        with:
          dotnet-version: '10.0.x'

      - name: Install WASM workload
        run: dotnet workload install wasm-tools

      - name: Restore Core
        run: dotnet restore MultiCalc.Core/MultiCalc.Core.csproj -p:TargetFrameworks=net10.0-browserwasm

      - name: Restore
        run: dotnet restore MultiCalc/MultiCalc.csproj -p:TargetFrameworks=net10.0-browserwasm --no-dependencies

      - name: Set BaseHref for deployment
        id: basehref
        run: |
          if [[ "${{ github.event_name }}" == "pull_request" ]]; then
            echo "value=/MultiCalc/pr/${{ github.event.pull_request.number }}/" >> $GITHUB_OUTPUT
          else
            echo "value=/MultiCalc/" >> $GITHUB_OUTPUT
          fi

      - name: Publish WASM
        run: dotnet publish MultiCalc/MultiCalc.csproj -c Release -f net10.0-browserwasm -p:TargetFrameworks=net10.0-browserwasm -p:BaseHref=${{ steps.basehref.outputs.value }} -o artifacts/wasm --no-restore

      - name: Upload WASM artifact
        uses: actions/upload-artifact@v4
        with:
          name: wasm
          path: artifacts/wasm
          retention-days: 7

  build-desktop-linux:
    if: github.event_name == 'push' || github.event_name == 'pull_request' || github.event_name == 'workflow_dispatch'
    needs: test
    runs-on: ubuntu-latest
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-dotnet@v5
        with:
          dotnet-version: '10.0.x'

      - name: Restore Core
        run: dotnet restore MultiCalc.Core/MultiCalc.Core.csproj -p:TargetFrameworks=net10.0-desktop

      - name: Restore
        run: dotnet restore MultiCalc/MultiCalc.csproj -p:TargetFrameworks=net10.0-desktop --no-dependencies

      - name: Publish Linux Desktop
        run: dotnet publish MultiCalc/MultiCalc.csproj -c Release -f net10.0-desktop -p:TargetFrameworks=net10.0-desktop -o artifacts/linux-desktop --no-restore

      - name: Upload Linux artifact
        uses: actions/upload-artifact@v4
        with:
          name: linux-desktop
          path: artifacts/linux-desktop
          retention-days: 7

  build-windows:
    if: github.event_name == 'push' || github.event_name == 'pull_request' || github.event_name == 'workflow_dispatch'
    needs: test
    runs-on: windows-latest
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-dotnet@v5
        with:
          dotnet-version: '10.0.x'

      - name: Restore Core
        run: dotnet restore MultiCalc.Core/MultiCalc.Core.csproj -p:TargetFrameworks=net10.0-desktop

      - name: Restore
        run: dotnet restore MultiCalc/MultiCalc.csproj -p:TargetFrameworks=net10.0-desktop --no-dependencies

      - name: Publish Windows
        run: dotnet publish MultiCalc/MultiCalc.csproj -c Release -f net10.0-desktop -p:TargetFrameworks=net10.0-desktop -o artifacts/windows --no-restore

      - name: Upload Windows artifact
        uses: actions/upload-artifact@v4
        with:
          name: windows
          path: artifacts/windows
          retention-days: 7

  build-android:
    if: github.event_name == 'push' || github.event_name == 'pull_request' || github.event_name == 'workflow_dispatch'
    needs: test
    runs-on: ubuntu-latest
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-dotnet@v5
        with:
          dotnet-version: '10.0.x'

      - name: Install Android workload
        run: dotnet workload install android

      - name: Restore Core
        run: dotnet restore MultiCalc.Core/MultiCalc.Core.csproj -p:TargetFrameworks=net10.0-android

      - name: Restore
        run: dotnet restore MultiCalc/MultiCalc.csproj -p:TargetFrameworks=net10.0-android --no-dependencies

      - name: Publish Android
        run: dotnet publish MultiCalc/MultiCalc.csproj -c Release -f net10.0-android -p:TargetFrameworks=net10.0-android -o artifacts/android --no-restore

      - name: Upload Android artifact
        uses: actions/upload-artifact@v4
        with:
          name: android
          path: artifacts/android
          retention-days: 7

  build-ios-macos:
    if: github.event_name == 'push' || github.event_name == 'pull_request' || github.event_name == 'workflow_dispatch'
    needs: test
    runs-on: macos-latest
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-dotnet@v5
        with:
          dotnet-version: '10.0.x'

      - name: Install iOS workload
        run: dotnet workload install ios
        # macOS desktop usually available; iOS for simulator/archive

      - name: Restore Core (macOS Desktop)
        run: dotnet restore MultiCalc.Core/MultiCalc.Core.csproj -p:TargetFrameworks=net10.0-desktop

      - name: Restore macOS Desktop
        run: dotnet restore MultiCalc/MultiCalc.csproj -p:TargetFrameworks=net10.0-desktop --no-dependencies

      - name: Publish macOS Desktop
        run: dotnet publish MultiCalc/MultiCalc.csproj -c Release -f net10.0-desktop -p:TargetFrameworks=net10.0-desktop -o artifacts/macos --no-restore

      - name: Restore Core (iOS)
        run: dotnet restore MultiCalc.Core/MultiCalc.Core.csproj -p:TargetFrameworks=net10.0-ios

      - name: Restore iOS
        run: dotnet restore MultiCalc/MultiCalc.csproj -p:TargetFrameworks=net10.0-ios --no-dependencies

      - name: Publish iOS (unsigned for CI)
        run: dotnet publish MultiCalc/MultiCalc.csproj -c Release -f net10.0-ios -p:TargetFrameworks=net10.0-ios -o artifacts/ios --no-restore || echo "iOS publish may require additional setup/signing; artifact may be partial"

      - name: Upload iOS/macOS artifacts
        uses: actions/upload-artifact@v4
        with:
          name: ios-macos
          path: artifacts/
          retention-days: 7

  deploy-wasm-main:
    if: (github.event_name == 'push' && github.ref == 'refs/heads/main') || github.event_name == 'workflow_dispatch'
    needs: build-wasm
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pages: write
      id-token: write
    concurrency:
      group: "pages-main"
      cancel-in-progress: false
    environment:
      name: github-pages
      url: https://knybbe.github.io/MultiCalc/
    steps:
      - name: Download WASM artifact from build-wasm
        uses: actions/download-artifact@v4
        with:
          name: wasm
          path: site

      - name: Prepare GitHub Pages site (promote wwwroot + SPA fallback)
        run: |
          if [ -d "site/wwwroot" ]; then
            cp -r site/wwwroot/* site/ || true
            rm -rf site/wwwroot || true
          fi
          cp site/index.html site/404.html || true
          touch site/.nojekyll

      - name: Add service worker stub
        run: echo 'self.addEventListener("install", () => self.skipWaiting());' > site/service-worker.js || true

      - name: Fix paths for /MultiCalc/ (normalize)
        run: |
          for f in $(find site -type f \( -name "*.html" -o -name "*.js" -o -name "*.css" -o -name "*.json" -o -name "manifest.webmanifest" \) 2>/dev/null); do
            sed -i 's|/MultiCalc/MultiCalc/|/MultiCalc/|g' "$f" || true
            sed -i 's|="\(/[^M][^"]*\)"|="/MultiCalc\1"|g' "$f" || true
            sed -i "s|='\(/[^M][^']*\)'|='/MultiCalc\1'|g" "$f" || true

            # Broader Uno asset paths + strip integrity (helps with any post-processing)
            sed -i 's|"/_\([^"/]\)|"/MultiCalc/_\1|g' "$f" || true
            sed -i 's|"/package_\([^"/]\)|"/MultiCalc/package_\1|g' "$f" || true
            sed -i 's/ integrity="[^"]*"//g' "$f" || true
            sed -i "s/ integrity='[^']*'//g" "$f" || true
          done || true

      - name: Remove pre-compressed
        run: find site \( -name "*.br" -o -name "*.gz" \) -delete || true

      - name: Setup Pages
        uses: actions/configure-pages@v5

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: ./site

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4

  deploy-wasm-pr:
    if: github.event_name == 'pull_request' && github.event.pull_request.head.repo.full_name == github.repository
    needs: build-wasm
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pages: write
      id-token: write
      pull-requests: write
    concurrency:
      group: "pages-pr-${{ github.event.pull_request.number }}"
      cancel-in-progress: true
    environment:
      name: prerelease
      url: https://knybbe.github.io/MultiCalc/pr/${{ github.event.pull_request.number }}/
    steps:
      - name: Download WASM artifact from build-wasm
        uses: actions/download-artifact@v4
        with:
          name: wasm
          path: site

      - name: Prepare GitHub Pages site (promote wwwroot + SPA fallback)
        run: |
          if [ -d "site/wwwroot" ]; then
            cp -r site/wwwroot/* site/ || true
            rm -rf site/wwwroot || true
          fi
          cp site/index.html site/404.html || true
          touch site/.nojekyll

      - name: Strip integrity attributes early (to prevent SRI on subpath)
        run: |
          # Remove all integrity attributes from the published files before restructure
          find site -type f \( -name "*.html" -o -name "*.js" -o -name "*.json" -o -name "manifest.webmanifest" \) -exec \
            sed -i 's/ *integrity="[^"]*"//gI' {} + || true
          find site -type f \( -name "*.html" -o -name "*.js" -o -name "*.json" -o -name "manifest.webmanifest" \) -exec \
            sed -i "s/ *integrity='[^']*'//gI" {} + || true
          find site -type f \( -name "*.html" -o -name "*.js" -o -name "*.json" -o -name "manifest.webmanifest" \) -exec \
            sed -i 's/"integrity":"[^"]*"//gI' {} + || true
          # Clear hashes in boot json / manifest to disable SRI in JS loader (set to empty)
          find site -type f \( -name "*.json" -o -name "manifest.webmanifest" \) -exec \
            sed -i 's/"sha256-[^"]*"/""/g' {} + || true
          # Explicit on index if present
          [ -f site/index.html ] && sed -i 's/ *integrity="[^"]*"//gI' site/index.html || true
          [ -f site/index.html ] && sed -i "s/ *integrity='[^']*'//gI" site/index.html || true

      - name: Restructure for pr/${{ github.event.pull_request.number }} subpath
        run: |
          PR_NUM="${{ github.event.pull_request.number }}"
          mkdir -p /tmp/app
          shopt -s dotglob 2>/dev/null || true
          cp -a site/* /tmp/app/ 2>/dev/null || true
          cp -a site/.[!.]* /tmp/app/ 2>/dev/null || true
          mkdir -p site/pr/$PR_NUM
          cp -a /tmp/app/* site/pr/$PR_NUM/ 2>/dev/null || true
          cp -a /tmp/app/.[!.]* site/pr/$PR_NUM/ 2>/dev/null || true
          rm -rf /tmp/app
          # ensure .nojekyll (for Pages) and 404.html are present inside the subdir too
          touch site/.nojekyll
          cp site/.nojekyll site/pr/$PR_NUM/.nojekyll 2>/dev/null || true
          cp site/pr/$PR_NUM/index.html site/pr/$PR_NUM/404.html 2>/dev/null || true
          # put a placeholder at artifact root so PR deploy does not completely 404 the main URL
          cat > site/index.html << 'HTMLEOF'
          <!doctype html>
          <html><head><meta charset="utf-8"><meta http-equiv="refresh" content="0; url=pr/__PRNUM__/"></head>
          <body>Preview for this PR is at <a href="pr/__PRNUM__/">pr/__PRNUM__/</a>. Main site is at <a href="https://knybbe.github.io/MultiCalc/">root</a>.</body></html>
          HTMLEOF
          sed -i 's/^          //' site/index.html
          sed -i "s|__PRNUM__|${PR_NUM}|g" site/index.html
          cp site/index.html site/404.html 2>/dev/null || true

      - name: Add service worker stub
        run: |
          PR_NUM="${{ github.event.pull_request.number }}"
          echo 'self.addEventListener("install", () => self.skipWaiting());' > site/pr/$PR_NUM/service-worker.js || true

      - name: Fix paths for /MultiCalc/pr/$PR_NUM (normalize)
        run: |
          PR_NUM="${{ github.event.pull_request.number }}"
          PR_PREFIX="/MultiCalc/pr/${PR_NUM}"
          # rewrite using loop for robust quoting + var expansion (GNU sed on ubuntu runner)
          for f in $(find site/pr/$PR_NUM -type f \( -name "*.html" -o -name "*.js" -o -name "*.css" -o -name "*.json" -o -name "manifest.webmanifest" \) 2>/dev/null); do
            # 1. normalize double main prefix
            sed -i 's|/MultiCalc/MultiCalc/|'"$PR_PREFIX"'/|g' "$f" || true
            # 2. normalize erroneous MultiCalc nested under the pr subdir
            sed -i 's|/MultiCalc/pr/[0-9]*/MultiCalc/|'"$PR_PREFIX"'/|g' "$f" || true
            # 3. rebase any erroneous top-level /MultiCalc/ (not already under /pr/)
            sed -i 's|/MultiCalc/\(pr/[0-9]*/\)\{0,1\}\([^p]\)|'"$PR_PREFIX"'/\2|g' "$f" || true

            # 4. prefix bare attribute paths (existing)
            sed -i 's|="\(/[^M][^"]*\)"|="'"$PR_PREFIX"'\1"|g' "$f" || true
            sed -i "s|='\(/[^M][^']*\)'|='$PR_PREFIX\1'|g" "$f" || true

            # 5. Broader fixes for Uno WASM dynamic loaders (require.js, uno-bootstrap, package hash, _framework)
            # Prefix bare asset roots only when they start with "/package_ or "/_ (safe, won't double-prefix already fixed paths)
            sed -i 's|"/package_\([^"]*\)"|"/'"$PR_PREFIX"'/package_\1"|g' "$f" || true
            sed -i "s|'/package_\([^']*\)'|'/ $PR_PREFIX /package_\1'|g" "$f" || true
            sed -i 's|"/_\([^"]*\)"|"/'"$PR_PREFIX"'/_\1"|g' "$f" || true
            sed -i "s|'/_\([^']*\)'|'/ $PR_PREFIX /_\1'|g" "$f" || true
            # Also direct (for cases without surrounding quotes in the match)
            sed -i 's|"/package_|"/'"$PR_PREFIX"'/package_|g' "$f" || true
            sed -i 's|"/_|"/'"$PR_PREFIX"'/_|g' "$f" || true

            # 6. Strip integrity attributes — post-processing + subpath deploys frequently break SRI hashes
            # Cover HTML, JS strings, JSON etc.
            sed -i 's/ integrity="[^"]*"//g' "$f" || true
            sed -i "s/ integrity='[^']*'//g" "$f" || true
            sed -i 's/ integrity=[^ >]*//g' "$f" || true
            sed -i 's/integrity:"[^"]*"//g' "$f" || true
            sed -i "s/integrity:'[^']*'//g" "$f" || true
            sed -i 's/"integrity":"[^"]*"//g' "$f" || true

            # 7. Cleanup any malformed prefixes (e.g. //MultiCalc from concat or partial rewrites)
            sed -i 's|//MultiCalc/pr/|/MultiCalc/pr/|g' "$f" || true
            sed -i 's|//MultiCalc/|/MultiCalc/|g' "$f" || true
            sed -i 's|//pr/|pr/|g' "$f" || true
            sed -i 's|"/MultiCalc/pr/[^"]*/MultiCalc/pr/|"/MultiCalc/pr/|g' "$f" || true
          done || true

          # Extra global pass to ensure integrity is stripped (SRI often survives in HTML/JS for wasm loads)
          find site/pr/$PR_NUM -type f \( -name "*.html" -o -name "*.js" -o -name "*.json" -o -name "manifest.webmanifest" \) -exec \
            sed -i 's/ integrity="[^"]*"//gI' {} + || true
          find site/pr/$PR_NUM -type f \( -name "*.html" -o -name "*.js" -o -name "*.json" -o -name "manifest.webmanifest" \) -exec \
            sed -i "s/ integrity='[^']*'//gI" {} + || true

          # Force strip on the actual app index.html (the one served for the subpath)
          if [ -f site/pr/$PR_NUM/index.html ]; then
            sed -i 's/ integrity="[^"]*"//gI' site/pr/$PR_NUM/index.html || true
            sed -i "s/ integrity='[^']*'//gI" site/pr/$PR_NUM/index.html || true
            sed -i 's/ integrity=[^ >]*//gI' site/pr/$PR_NUM/index.html || true
            # Also remove any integrity in JS style inside the html if inlined
            sed -i 's/integrity:"[^"]*"//gI' site/pr/$PR_NUM/index.html || true
          fi

      - name: Remove pre-compressed
        run: find site/pr -type f \( -name "*.br" -o -name "*.gz" \) -delete || true

      - name: Final integrity strip on app index.html (guarantee no SRI)
        run: |
          PR_NUM="${{ github.event.pull_request.number }}"
          APP_INDEX="site/pr/$PR_NUM/index.html"
          if [ -f "$APP_INDEX" ]; then
            sed -i 's/ *integrity="[^"]*"//gI' "$APP_INDEX" || true
            sed -i "s/ *integrity='[^']*'//gI" "$APP_INDEX" || true
            sed -i 's/ *integrity=[^ >]*//gI' "$APP_INDEX" || true
            echo "Stripped integrity from $APP_INDEX"
          fi
          # Clear sha hashes in json under subdir so JS loader skips integrity checks
          find site/pr/$PR_NUM -type f \( -name "*.json" -o -name "manifest.webmanifest" \) -exec \
            sed -i 's/"sha256-[^"]*"/""/g' {} + || true

      - name: Ultimate integrity strip using Python (ensures no SRI attributes left)
        run: |
          python3 - << 'PYEOF'
          import os
          import re
          import glob

          def strip_file(path):
              try:
                  with open(path, 'r', encoding='utf-8', errors='ignore') as f:
                      content = f.read()
                  # Remove integrity=... from HTML attributes (case insensitive)
                  content = re.sub(r'\s+integrity=["\'][^"\']*["\']', '', content, flags=re.IGNORECASE)
                  # Remove "integrity": "..." or 'integrity': '...' in JSON/JS
                  content = re.sub(r'"integrity"\s*:\s*"[^"]*"', '"integrity":""', content)
                  content = re.sub(r"'integrity'\s*:\s*'[^']*'", "'integrity':''", content)
                  # Remove sha256 hashes in json values
                  content = re.sub(r'"sha256-[^"]*"', '""', content)
                  with open(path, 'w', encoding='utf-8') as f:
                      f.write(content)
                  print(f"Stripped: {path}")
              except Exception as e:
                  print(f"Error stripping {path}: {e}")

          root = "site/pr"
          for dirpath, _, filenames in os.walk(root):
              for fn in filenames:
                  if fn.endswith(('.html', '.js', '.json', '.webmanifest')):
                      strip_file(os.path.join(dirpath, fn))

          # Explicit on the main index
          idx = None
          for p in glob.glob("site/pr/*/index.html"):
              idx = p
              break
          if idx and os.path.exists(idx):
              strip_file(idx)
              print(f"Final strip on {idx}")
          PYEOF

      - name: Debug - list files in PR subdir (to diagnose missing wasm)
        run: |
          PR_NUM="${{ github.event.pull_request.number }}"
          echo "=== Top level under site/pr/$PR_NUM ==="
          ls -1 site/pr/$PR_NUM/ 2>/dev/null || echo "no pr dir"
          echo "=== _framework dir exists? ==="
          ls -ld site/pr/$PR_NUM/_framework 2>/dev/null || echo "MISSING _framework dir"
          echo "=== Number of files in _framework ==="
          find site/pr/$PR_NUM/_framework -type f 2>/dev/null | wc -l || echo 0
          echo "=== Sample .wasm files ==="
          ls site/pr/$PR_NUM/_framework/*.wasm 2>/dev/null | head -5 || echo "NO .wasm files found"
          echo "=== Sample package dir ==="
          ls site/pr/$PR_NUM/package_* 2>/dev/null | head -1 || echo "NO package dir"

      - name: Setup Pages
        uses: actions/configure-pages@v5

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: ./site

      - name: Deploy to GitHub Pages (prerelease env)
        id: deployment
        uses: actions/deploy-pages@v4

      - name: Comment on PR with preview URL
        uses: actions/github-script@v7
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
          script: |
            const prNumber = context.payload.pull_request.number;
            const previewUrl = `https://knybbe.github.io/MultiCalc/pr/${prNumber}/`;
            github.rest.issues.createComment({
              issue_number: prNumber,
              owner: context.repo.owner,
              repo: context.repo.repo,
              body: `🚀 WASM preview deployed for this PR:\n\n${previewUrl}\n\n(Deployed from this run: ${context.serverUrl}/${context.repo.owner}/${context.repo.repo}/actions/runs/${context.runId})`
            });
